name: UiPath Test & Self-Heal Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-heal:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install UiPath CLI
      run: npm install -g @uipath/cli

    - name: Run Test Suite & Trigger Self-Healing on Failure
      env:
        UIPATH_CLI_ENABLE_ENV_AUTH: "true"
        UIPATH_CLI_AUTH_TOKEN: "${{ secrets.UIPATH_CLI_AUTH_TOKEN }}"
        UIPATH_ORGANIZATION_NAME: "${{ secrets.UIPATH_ORGANIZATION }}"
        UIPATH_TENANT_NAME: "${{ secrets.UIPATH_TENANT }}"
      run: |
        python ci_run.py \
          --project-key "${{ secrets.UIPATH_PROJECT_KEY }}" \
          --test-set-key "${{ secrets.UIPATH_TEST_SET_KEY }}" \
          --slack-channel "new-channel"
