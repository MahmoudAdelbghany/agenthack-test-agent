name: UiPath Test & Self-Heal Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test-and-heal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install UiPath CLI
      run: npm install -g @uipath/cli

    - name: Login to UiPath
      run: |
        uip login \
          --client-id "${{ secrets.UIPATH_CLIENT_ID }}" \
          --client-secret "${{ secrets.UIPATH_CLIENT_SECRET }}" \
          --organization "${{ secrets.UIPATH_ORGANIZATION }}" \
          --tenant "${{ secrets.UIPATH_TENANT }}" \
          --output json

    - name: Configure Python Environment and UiPath Coded Agent
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install uv
        uv sync
        uip codedagent setup

    - name: Run Test Suite & Trigger Self-Healing on Failure
      run: |
        source .venv/bin/activate
        python ci_run.py \
          --project-key "${{ secrets.UIPATH_PROJECT_KEY }}" \
          --test-set-key "${{ secrets.UIPATH_TEST_SET_KEY }}" \
          --slack-channel "new-channel" \
          --process-key "${{ secrets.UIPATH_PROCESS_KEY }}" \
          --folder-key "${{ secrets.UIPATH_FOLDER_KEY }}" \
          # --auto-approve intentionally omitted for this demo so the agent suspends for human approval in Slack / loop

          --head-branch "${{ github.head_ref || github.ref_name }}" \
          --pr-number "${{ github.event.pull_request.number || '' }}" \
          --repo "${{ github.repository }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}

